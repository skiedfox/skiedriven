<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiedriven</title>
<style>
  :root{
    --bg:#0a0c10;
    --card:#13171f;
    --card-hover:#1a2029;
    --accent:#ff4dd2;
    --accent-2:#9146ff;
    --text:#f4f7fb;
    --muted:#8a93a3;
    --border:rgba(255,255,255,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:48px 20px 64px;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(620px 440px at 15% -5%, rgba(145,70,255,.22), transparent 60%),
      radial-gradient(720px 520px at 95% 8%, rgba(255,77,210,.16), transparent 55%),
      radial-gradient(680px 520px at 50% 118%, rgba(61,120,255,.16), transparent 60%);
    pointer-events:none;
    z-index:0;
  }
  /* vignette douce pour la profondeur */
  body::after{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(125% 90% at 50% 28%, transparent 52%, rgba(0,0,0,.6) 100%);
    pointer-events:none;
    z-index:0;
  }
  /* halos colorés flottants */
  .orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.45;mix-blend-mode:screen;}
  .orb.o1{width:360px;height:360px;background:#9146ff;top:-70px;left:-50px;animation:drift1 19s ease-in-out infinite;}
  .orb.o2{width:320px;height:320px;background:#ff4dd2;top:34%;right:-70px;animation:drift2 23s ease-in-out infinite;}
  .orb.o3{width:300px;height:300px;background:#3dd1ff;bottom:-80px;left:28%;animation:drift3 27s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,70px)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,50px)}}
  @keyframes drift3{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-60px)}}
  #osu-bg{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.5;}
  .wrap{
    width:100%;
    max-width:440px;
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .avatar{
    width:108px;height:108px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    font-size:42px;font-weight:800;letter-spacing:-1px;
    color:#06080c;
    box-shadow:0 0 0 4px rgba(255,255,255,.04), 0 12px 44px rgba(145,70,255,.30);
    margin-bottom:18px;
    position:relative;
  }
  .avatar-img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;}
  .live{
    position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
    background:#ff2d55;color:#fff;font-size:10.5px;font-weight:800;letter-spacing:.6px;
    padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;
    box-shadow:0 4px 14px rgba(255,45,85,.5);
  }
  .live .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.3s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  .name{
    font-size:25px;font-weight:800;letter-spacing:.5px;
    display:flex;align-items:center;gap:8px;margin-top:6px;
  }
  .verified{width:18px;height:18px;fill:var(--accent);}
  .handle{color:var(--muted);font-size:15px;margin-top:4px;}
  .bio{
    color:#c6cdd9;font-size:14.5px;line-height:1.55;
    text-align:center;margin:14px 0 28px;max-width:340px;
  }

  .links{width:100%;display:flex;flex-direction:column;gap:13px;}
  .link{
    display:flex;align-items:center;gap:16px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px 18px;
    text-decoration:none;color:var(--text);
    font-weight:600;font-size:15.5px;
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .link:hover{
    transform:translateY(-2px);
    background:var(--card-hover);
    border-color:rgba(145,70,255,.4);
  }
  .ico{
    width:36px;height:36px;flex:0 0 36px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
  }
  .ico svg{width:21px;height:21px;fill:#fff;}
  .ico .mi{display:block;background:#fff;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;-webkit-mask-size:contain;mask-size:contain;}
  .ico.osu .mi{width:28px;height:24px;}
  .dc{background:#5865F2;}
  .dc .mi{width:23px;height:23px;}
  .tw{background:#9146ff;}
  .yt{background:#ff0033;}
  .tk{background:#000;border:1px solid #2a2f38;}
  .ig{background:linear-gradient(135deg,#feda75,#d62976,#962fbf);}
  .osu{background:linear-gradient(135deg,#ff66aa,#ff2d7e);}
  .link .meta{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .viewers{
    font-size:12px;color:#ff6b8a;font-weight:700;background:rgba(255,45,85,.12);
    padding:3px 8px;border-radius:6px;
  }
  .link .arrow{color:var(--muted);font-size:18px;transition:transform .15s;}
  .link:hover .arrow{transform:translateX(3px);color:var(--accent);}

  /* twitch highlight */
  .link.primary{
    background:linear-gradient(135deg,rgba(145,70,255,.22),rgba(145,70,255,.06));
    border-color:rgba(145,70,255,.5);
  }
  .link.primary:hover{background:linear-gradient(135deg,rgba(145,70,255,.30),rgba(145,70,255,.10));}

  .foot{
    margin-top:34px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.7;
  }
  .foot .dom{color:var(--accent);font-weight:600;}
  .mock{
    margin-top:8px;display:inline-block;font-size:11px;color:#5b6473;
    border:1px dashed #2a2f38;border-radius:6px;padding:3px 8px;
  }
</style>
</head>

  <script>
  (function(){
    var cv=document.getElementById('osu-bg');
    if(!cv) return;
    // PC + souris uniquement : desactive sur tactile / mobile
    var fine = window.matchMedia && window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    if(!fine){ cv.style.display='none'; return; }

    var ctx=cv.getContext('2d');
    var W=0,H=0,dpr=1,R=34;
    function resize(){
      dpr=Math.min(window.devicePixelRatio||1,2);
      W=window.innerWidth; H=window.innerHeight;
      cv.width=W*dpr; cv.height=H*dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
      R=Math.max(22,Math.min(40,Math.min(W,H)*0.045));
    }
    resize();
    window.addEventListener('resize',resize);

    var colors=['#ff4dd2','#9146ff','#3dd1ff'];
    var APPROACH=850, HIT=300, LIFE=APPROACH+HIT, SLIDE=380;
    var circles=[], combo=0;
    var mx=-999,my=-999, lastSpawn={x:-9999,y:-9999}, trail=[];

    window.addEventListener('mousemove',function(e){
      mx=e.clientX; my=e.clientY;
      var now=performance.now();
      trail.push({x:mx,y:my,t:now});
      if(trail.length>24) trail.shift();
      var spacing=Math.min(W,H)*0.21;
      var dx=mx-lastSpawn.x, dy=my-lastSpawn.y;
      if(dx*dx+dy*dy > spacing*spacing){
        combo=(combo%9)+1;
        circles.push({x:mx,y:my,t0:now,c:colors[(combo-1)%3],n:combo});
        if(circles.length>6) circles.shift();
        lastSpawn={x:mx,y:my};
      }
    });
    window.addEventListener('mousedown',function(e){
      combo=(combo%9)+1;
      circles.push({x:e.clientX,y:e.clientY,t0:performance.now(),c:colors[(combo-1)%3],n:combo});
      if(circles.length>6) circles.shift();
    });
    window.addEventListener('mouseout',function(e){ if(!e.relatedTarget){ mx=-999; my=-999; } });

    function ease(t){return 1-Math.pow(1-t,3);}
    function drawHit(o,a){
      ctx.beginPath(); ctx.arc(o.x,o.y,R,0,6.2832);
      ctx.fillStyle='rgba(12,14,20,'+(0.5*a)+')'; ctx.fill();
      ctx.globalAlpha=a; ctx.strokeStyle=o.c; ctx.lineWidth=Math.max(3,R*0.13); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,'+(0.92*a)+')';
      ctx.font='600 '+(R*0.78)+'px -apple-system,Segoe UI,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(o.n,o.x,o.y+1);
      ctx.globalAlpha=1;
    }
    function drawTrail(now){
      while(trail.length && now-trail[0].t>300) trail.shift();
      if(trail.length<2) return;
      ctx.lineCap='round'; ctx.lineJoin='round';
      for(var i=1;i<trail.length;i++){
        var p0=trail[i-1], p1=trail[i], a=i/trail.length;
        ctx.strokeStyle='rgba(255,77,210,'+(0.45*a)+')';
        ctx.lineWidth=Math.max(1,R*0.5*a);
        ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.stroke();
      }
    }
    function draw(now){
      ctx.clearRect(0,0,W,H);
      // slider entre cercles consecutifs
      ctx.lineCap='round'; ctx.lineJoin='round';
      for(var i=0;i<circles.length-1;i++){
        var sa=circles[i], sb=circles[i+1];
        var aa=Math.max(0,1-(now-sa.t0)/LIFE);
        if(aa<=0) continue;
        ctx.strokeStyle='rgba(255,255,255,'+(0.08*aa)+')';
        ctx.lineWidth=R*1.4;
        ctx.beginPath(); ctx.moveTo(sa.x,sa.y); ctx.lineTo(sb.x,sb.y); ctx.stroke();
        // boule de slider qui parcourt le segment
        var st=(now-sb.t0)/SLIDE;
        if(st>=0 && st<=1){
          var bx=sa.x+(sb.x-sa.x)*st, by=sa.y+(sb.y-sa.y)*st;
          ctx.globalAlpha=0.55; ctx.strokeStyle=sb.c; ctx.lineWidth=2.5;
          ctx.beginPath(); ctx.arc(bx,by,R*1.35,0,6.2832); ctx.stroke();
          ctx.globalAlpha=0.92; ctx.fillStyle=sb.c;
          ctx.beginPath(); ctx.arc(bx,by,R*0.6,0,6.2832); ctx.fill();
          ctx.globalAlpha=1;
        }
      }
      for(var k=0;k<circles.length;k++){
        var o=circles[k], age=now-o.t0;
        if(age>=LIFE) continue;
        if(age<APPROACH){
          var pr=age/APPROACH;
          var ar=R+(R*2.4)*(1-ease(pr));
          ctx.globalAlpha=0.2+0.6*pr; ctx.strokeStyle=o.c; ctx.lineWidth=2.5;
          ctx.beginPath(); ctx.arc(o.x,o.y,ar,0,6.2832); ctx.stroke(); ctx.globalAlpha=1;
          drawHit(o,0.3+0.6*pr);
        } else {
          var ha=(age-APPROACH)/HIT;
          ctx.globalAlpha=(1-ha); ctx.strokeStyle=o.c; ctx.lineWidth=3;
          ctx.beginPath(); ctx.arc(o.x,o.y,R+(R*1.4)*ha,0,6.2832); ctx.stroke(); ctx.globalAlpha=1;
          drawHit(o,1-ha);
        }
      }
      drawTrail(now);
      // curseur osu
      if(mx>-900){
        ctx.beginPath(); ctx.arc(mx,my,R*0.32,0,6.2832);
        ctx.fillStyle='rgba(255,255,255,.92)'; ctx.fill();
        ctx.lineWidth=2.5; ctx.strokeStyle=colors[combo%3]; ctx.stroke();
      }
    }
    function loop(now){ draw(now); requestAnimationFrame(loop); }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
