<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiedriven</title>
<style>
  :root{
    --bg:#0a0c10;
    --card:#13171f;
    --card-hover:#1a2029;
    --accent:#ff4dd2;
    --accent-2:#9146ff;
    --text:#f4f7fb;
    --muted:#8a93a3;
    --border:rgba(255,255,255,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:48px 20px 64px;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(620px 440px at 15% -5%, rgba(145,70,255,.22), transparent 60%),
      radial-gradient(720px 520px at 95% 8%, rgba(255,77,210,.16), transparent 55%),
      radial-gradient(680px 520px at 50% 118%, rgba(61,120,255,.16), transparent 60%);
    pointer-events:none;
    z-index:0;
  }
  /* texture de fond : grille de points + lignes diagonales subtiles */
  body::after{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
      repeating-linear-gradient(135deg, rgba(255,255,255,.025) 0 1px, transparent 1px 26px);
    background-size:24px 24px, auto;
    -webkit-mask-image:radial-gradient(circle at 50% 32%, #000 0%, rgba(0,0,0,.4) 55%, transparent 80%);
    mask-image:radial-gradient(circle at 50% 32%, #000 0%, rgba(0,0,0,.4) 55%, transparent 80%);
    pointer-events:none;
    z-index:0;
  }
  #osu-bg{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.6;}
  .wrap{
    width:100%;
    max-width:440px;
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .avatar{
    width:108px;height:108px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    font-size:42px;font-weight:800;letter-spacing:-1px;
    color:#06080c;
    box-shadow:0 0 0 4px rgba(255,255,255,.04), 0 12px 44px rgba(145,70,255,.30);
    margin-bottom:18px;
    position:relative;
  }
  .avatar-img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;}
  .live{
    position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
    background:#ff2d55;color:#fff;font-size:10.5px;font-weight:800;letter-spacing:.6px;
    padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;
    box-shadow:0 4px 14px rgba(255,45,85,.5);
  }
  .live .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.3s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  .name{
    font-size:25px;font-weight:800;letter-spacing:.5px;
    display:flex;align-items:center;gap:8px;margin-top:6px;
  }
  .verified{width:18px;height:18px;fill:var(--accent);}
  .handle{color:var(--muted);font-size:15px;margin-top:4px;}
  .bio{
    color:#c6cdd9;font-size:14.5px;line-height:1.55;
    text-align:center;margin:14px 0 28px;max-width:340px;
  }

  .links{width:100%;display:flex;flex-direction:column;gap:13px;}
  .link{
    display:flex;align-items:center;gap:16px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px 18px;
    text-decoration:none;color:var(--text);
    font-weight:600;font-size:15.5px;
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .link:hover{
    transform:translateY(-2px);
    background:var(--card-hover);
    border-color:rgba(145,70,255,.4);
  }
  .ico{
    width:36px;height:36px;flex:0 0 36px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
  }
  .ico svg{width:21px;height:21px;fill:#fff;}
  .tw{background:#9146ff;}
  .yt{background:#ff0033;}
  .tk{background:#000;border:1px solid #2a2f38;}
  .ig{background:linear-gradient(135deg,#feda75,#d62976,#962fbf);}
  .osu{background:linear-gradient(135deg,#ff66aa,#ff2d7e);}
  .link .meta{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .viewers{
    font-size:12px;color:#ff6b8a;font-weight:700;background:rgba(255,45,85,.12);
    padding:3px 8px;border-radius:6px;
  }
  .link .arrow{color:var(--muted);font-size:18px;transition:transform .15s;}
  .link:hover .arrow{transform:translateX(3px);color:var(--accent);}

  /* twitch highlight */
  .link.primary{
    background:linear-gradient(135deg,rgba(145,70,255,.22),rgba(145,70,255,.06));
    border-color:rgba(145,70,255,.5);
  }
  .link.primary:hover{background:linear-gradient(135deg,rgba(145,70,255,.30),rgba(145,70,255,.10));}

  .foot{
    margin-top:34px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.7;
  }
  .foot .dom{color:var(--accent);font-weight:600;}
  .mock{
    margin-top:8px;display:inline-block;font-size:11px;color:#5b6473;
    border:1px dashed #2a2f38;border-radius:6px;padding:3px 8px;
  }
</style>
</head>

  <script>
  (function(){
    var cv=document.getElementById('osu-bg');
    if(!cv) return;
    var ctx=cv.getContext('2d');
    var W=0,H=0,dpr=1;
    function resize(){
      dpr=Math.min(window.devicePixelRatio||1,2);
      W=window.innerWidth; H=window.innerHeight;
      cv.width=W*dpr; cv.height=H*dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    resize();
    window.addEventListener('resize',resize);

    var colors=['#ff4dd2','#9146ff','#3dd1ff'];
    var R=Math.max(26,Math.min(46,Math.min(W,H)*0.05));
    var APPROACH=820, HIT=340, LIFE=APPROACH+HIT+260;
    var circles=[], combo=0, last={x:W*0.5,y:H*0.45}, lastSpawn=0, SPAWN=860;

    var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function nextPos(p){
      for(var i=0;i<12;i++){
        var a=Math.random()*Math.PI*2;
        var d=Math.min(W,H)*(0.16+Math.random()*0.24);
        var nx=p.x+Math.cos(a)*d, ny=p.y+Math.sin(a)*d;
        var m=Math.min(W,H)*0.1;
        if(nx>m&&nx<W-m&&ny>m&&ny<H-m) return {x:nx,y:ny};
      }
      return {x:W*0.2+Math.random()*W*0.6, y:H*0.2+Math.random()*H*0.6};
    }
    function spawn(now){
      R=Math.max(26,Math.min(46,Math.min(W,H)*0.05));
      var p=nextPos(last); last=p; combo=(combo%9)+1;
      circles.push({x:p.x,y:p.y,t0:now,c:colors[(combo-1)%colors.length],n:combo});
      if(circles.length>14) circles.shift();
    }

    function draw(now){
      ctx.clearRect(0,0,W,H);
      // parcours / sliders entre cercles encore "vivants"
      var live=circles.filter(function(o){return now-o.t0<APPROACH+HIT;});
      if(live.length>1){
        ctx.lineWidth=Math.max(2,R*0.16);
        ctx.lineCap='round'; ctx.lineJoin='round';
        for(var i=0;i<live.length-1;i++){
          var a=live[i], b=live[i+1];
          ctx.strokeStyle='rgba(255,255,255,0.06)';
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
      }
      for(var k=0;k<circles.length;k++){
        var o=circles[k], age=now-o.t0;
        if(age>LIFE) continue;
        ctx.save();
        if(age<APPROACH){
          var pr=age/APPROACH;                 // 0 -> 1
          var ar=R+(R*2.6)*(1-pr);
          // approach circle
          ctx.globalAlpha=0.15+0.55*pr;
          ctx.strokeStyle=o.c; ctx.lineWidth=2.5;
          ctx.beginPath(); ctx.arc(o.x,o.y,ar,0,Math.PI*2); ctx.stroke();
          // hit circle
          ctx.globalAlpha=0.25+0.6*pr;
          drawHit(o,1);
        } else {
          var ha=(age-APPROACH)/HIT;            // 0 -> 1 puis fade
          if(ha<=1){
            ctx.globalAlpha=(1-ha)*0.8;
            ctx.strokeStyle=o.c; ctx.lineWidth=3;
            ctx.beginPath(); ctx.arc(o.x,o.y,R+(R*1.3)*ha,0,Math.PI*2); ctx.stroke();
            ctx.globalAlpha=(1-ha);
            drawHit(o,1-ha*0.4);
          } else {
            ctx.globalAlpha=Math.max(0,1-(age-APPROACH-HIT)/260);
            drawHit(o,0.6);
          }
        }
        ctx.restore();
      }
    }
    function drawHit(o,fillA){
      ctx.beginPath(); ctx.arc(o.x,o.y,R,0,Math.PI*2);
      ctx.fillStyle='rgba(10,12,16,0.55)'; ctx.fill();
      ctx.strokeStyle=o.c; ctx.lineWidth=Math.max(3,R*0.12);
      ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,'+(0.85*fillA)+')';
      ctx.font='600 '+(R*0.8)+'px -apple-system,Segoe UI,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(o.n,o.x,o.y+1);
    }

    var t0=performance.now();
    function loop(now){
      if(!reduce){
        if(now-lastSpawn>SPAWN){ spawn(now); lastSpawn=now; }
        draw(now);
      }
      requestAnimationFrame(loop);
    }
    // amorce quelques cercles au lancement
    if(!reduce){ for(var s=0;s<3;s++){ spawn(t0-s*300); } lastSpawn=t0; }
    requestAnimationFrame(loop);
  })();
  </script>
