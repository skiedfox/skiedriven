<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skiedriven</title>
<style>
  :root{
    --bg:#0a0c10;
    --card:#13171f;
    --card-hover:#1a2029;
    --accent:#ff4dd2;
    --accent-2:#9146ff;
    --text:#f4f7fb;
    --muted:#8a93a3;
    --border:rgba(255,255,255,.07);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:48px 20px 64px;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(600px 400px at 18% 0%, rgba(145,70,255,.20), transparent 60%),
      radial-gradient(700px 500px at 92% 8%, rgba(255,77,210,.15), transparent 55%);
    pointer-events:none;
    z-index:0;
  }
  .wrap{
    width:100%;
    max-width:440px;
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .avatar{
    width:108px;height:108px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    font-size:42px;font-weight:800;letter-spacing:-1px;
    color:#06080c;
    box-shadow:0 0 0 4px rgba(255,255,255,.04), 0 12px 44px rgba(145,70,255,.30);
    margin-bottom:18px;
    position:relative;
  }
  .avatar-img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;}
  .live{
    position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
    background:#ff2d55;color:#fff;font-size:10.5px;font-weight:800;letter-spacing:.6px;
    padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;
    box-shadow:0 4px 14px rgba(255,45,85,.5);
  }
  .live .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.3s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}

  .name{
    font-size:25px;font-weight:800;letter-spacing:.5px;
    display:flex;align-items:center;gap:8px;margin-top:6px;
  }
  .verified{width:18px;height:18px;fill:var(--accent);}
  .handle{color:var(--muted);font-size:15px;margin-top:4px;}
  .bio{
    color:#c6cdd9;font-size:14.5px;line-height:1.55;
    text-align:center;margin:14px 0 28px;max-width:340px;
  }

  .links{width:100%;display:flex;flex-direction:column;gap:13px;}
  .link{
    display:flex;align-items:center;gap:16px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px 18px;
    text-decoration:none;color:var(--text);
    font-weight:600;font-size:15.5px;
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .link:hover{
    transform:translateY(-2px);
    background:var(--card-hover);
    border-color:rgba(145,70,255,.4);
  }
  .ico{
    width:36px;height:36px;flex:0 0 36px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
  }
  .ico svg{width:21px;height:21px;fill:#fff;}
  .tw{background:#9146ff;}
  .yt{background:#ff0033;}
  .tk{background:#000;border:1px solid #2a2f38;}
  .ig{background:linear-gradient(135deg,#feda75,#d62976,#962fbf);}
  .osu{background:linear-gradient(135deg,#ff66aa,#ff2d7e);}
  .link .meta{margin-left:auto;display:flex;align-items:center;gap:10px;}
  .viewers{
    font-size:12px;color:#ff6b8a;font-weight:700;background:rgba(255,45,85,.12);
    padding:3px 8px;border-radius:6px;
  }
  .link .arrow{color:var(--muted);font-size:18px;transition:transform .15s;}
  .link:hover .arrow{transform:translateX(3px);color:var(--accent);}

  /* twitch highlight */
  .link.primary{
    background:linear-gradient(135deg,rgba(145,70,255,.22),rgba(145,70,255,.06));
    border-color:rgba(145,70,255,.5);
  }
  .link.primary:hover{background:linear-gradient(135deg,rgba(145,70,255,.30),rgba(145,70,255,.10));}

  .foot{
    margin-top:34px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.7;
  }
  .foot .dom{color:var(--accent);font-weight:600;}
  .mock{
    margin-top:8px;display:inline-block;font-size:11px;color:#5b6473;
    border:1px dashed #2a2f38;border-radius:6px;padding:3px 8px;
  }
</style>
</head>
